<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="Unfollowers">
  <style>
    @media (prefers-color-scheme: dark) {
      .bg { fill: #18181b; }
      .icon { fill: #a78bfa; }
    }
    @media (prefers-color-scheme: light) {
      .bg { fill: #ffffff; }
      .icon { fill: #7c3aed; }
    }
  </style>
  <!-- Rounded square background -->
  <rect class="bg" width="32" height="32" rx="8"/>
  <!-- Person silhouette (head + shoulders) -->
  <circle class="icon" cx="13" cy="11" r="4"/>
  <path class="icon" d="M5 25c0-5 3.6-8 8-8s8 3 8 8"/>
  <!-- Small "x" mark indicating unfollowed -->
  <line class="icon" x1="22" y1="8" x2="28" y2="14" stroke-width="2.5" stroke-linecap="round"/>
  <line class="icon" x1="28" y1="8" x2="22" y2="14" stroke-width="2.5" stroke-linecap="round"/>
</svg>
